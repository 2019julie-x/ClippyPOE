name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        include:
          - os: ubuntu-22.04
            artifact_name: ClippyPOE-Linux
            artifact_path: dist/*.AppImage
          - os: windows-latest
            artifact_name: ClippyPOE-Windows
            artifact_path: dist/*.exe
          - os: macos-latest
            artifact_name: ClippyPOE-macOS
            artifact_path: dist/*.dmg
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libfuse2
    
    - name: Install dependencies
      run: npm install
    
    - name: Run tests
      run: npm test
    
    - name: Build for ${{ matrix.os }}
      run: npm run build -- --publish never
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_path }}
        if-no-files-found: warn
  
  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
    
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Generate release notes
      id: release_notes
      run: |
        echo "NOTES<<EOF" >> $GITHUB_OUTPUT
        echo "## ClippyPOE ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### Downloads" >> $GITHUB_OUTPUT
        echo "- **Windows**: Download the .exe installer" >> $GITHUB_OUTPUT
        echo "- **Linux**: Download the .AppImage" >> $GITHUB_OUTPUT
        echo "- **macOS**: Download the .dmg" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### Installation" >> $GITHUB_OUTPUT
        echo "1. Download the appropriate file for your platform" >> $GITHUB_OUTPUT
        echo "2. Run the installer" >> $GITHUB_OUTPUT
        echo "3. Configure your Path of Exile Client.txt path in Settings" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### What's New" >> $GITHUB_OUTPUT
        
        # Get previous tag, or generate full log if this is the first tag
        if PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null); then
          git log --pretty=format:"- %s" "$PREV_TAG..HEAD" >> $GITHUB_OUTPUT
        else
          git log --pretty=format:"- %s" >> $GITHUB_OUTPUT
        fi
        
        echo "" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: ClippyPOE ${{ steps.version.outputs.VERSION }}
        body: ${{ steps.release_notes.outputs.NOTES }}
        draft: false
        prerelease: false
        files: |
          artifacts/ClippyPOE-Linux/*
          artifacts/ClippyPOE-Windows/*
          artifacts/ClippyPOE-macOS/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
